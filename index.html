<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mixed Signals</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        #app {
            padding: 1.25rem 1rem;
            font-family: var(--font-mono)
        }

        h2.sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0)
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1rem
        }

        .panel {
            background: var(--color-background-secondary);
            border: 0.5px solid var(--color-border-tertiary);
            border-radius: var(--border-radius-md);
            padding: .75rem
        }

        .panel-label {
            font-size: 11px;
            color: var(--color-text-tertiary);
            letter-spacing: .07em;
            text-transform: uppercase;
            margin-bottom: .5rem
        }

        canvas {
            display: block;
            width: 100%;
            height: 100px;
            background: var(--color-background-primary);
            border-radius: 4px;
            border: 0.5px solid var(--color-border-tertiary)
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: .75rem;
            margin-top: .75rem
        }

        .ctrl {
            display: flex;
            flex-direction: column;
            gap: 4px
        }

        .ctrl label {
            font-size: 12px;
            color: var(--color-text-secondary);
            display: flex;
            justify-content: space-between
        }

        .ctrl label span {
            color: var(--color-text-primary);
            font-weight: 500
        }

        input[type=range] {
            width: 100%
        }

        .score-bar {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: .75rem;
            font-size: 13px;
            color: var(--color-text-secondary)
        }

        .score-bar b {
            color: var(--color-text-primary);
            font-weight: 500
        }

        .match-meter {
            flex: 1;
            height: 8px;
            background: var(--color-background-secondary);
            border-radius: 4px;
            overflow: hidden;
            border: 0.5px solid var(--color-border-tertiary)
        }

        .match-fill {
            height: 100%;
            border-radius: 4px;
            transition: width .1s, background .1s
        }

        .feedback {
            font-size: 13px;
            text-align: center;
            min-height: 22px;
            color: var(--color-text-secondary);
            margin: .5rem 0
        }

        .feedback.win {
            color: var(--color-text-success)
        }

        .type-btns {
            display: flex;
            gap: .5rem;
            margin-bottom: .75rem;
            flex-wrap: wrap
        }

        .type-btn {
            font-size: 12px;
            padding: 4px 10px;
            cursor: pointer;
            border-radius: var(--border-radius-md);
            border: 0.5px solid var(--color-border-secondary);
            background: transparent;
            color: var(--color-text-secondary);
            font-family: var(--font-mono);
            transition: background .1s, color .1s
        }

        .type-btn:hover {
            background: var(--color-background-secondary)
        }

        .type-btn.active {
            background: var(--color-background-info);
            color: var(--color-text-info);
            border-color: var(--color-border-info)
        }

        .btn-row {
            display: flex;
            gap: .5rem;
            margin-top: .75rem
        }

        .btn-row button {
            flex: 1
        }
    </style>
    <script src="main.js" defer></script>
</head>

<body>
    <div class="app">
        <h2 class="sr-only">Mixed Signals: adjust your waveform parameters to match the target signal.</h2>
        <div class="score-bar">
            <span>match</span>
            <div class="match-meter">
                <div class="match-fill" id="fill" style="width: 0%;"></div>
            </div>
            <b id="pct">0%</b>
            <span style="margin-left:.5rem;">score <b id="score"></b></span>
        </div>

        <div class="row">
            <div class="panel">
                <div class="panel-label">target</div>
                <canvas id="canvasTarget" width="442" height="100"></canvas>
            </div>
            <div class="panel">
                <div class="panel-label">your signal</div>
                <canvas id="canvasPlayer" width="442" height="100"></canvas>
            </div>
        </div>

        <div class="panel">
            <div class="panel-label">edit your signal</div>
            <div class="type-btns" id="type-btns">
                <button class="type-btn active" data-t="sine" onclick="setType(this)">sine</button>
                <button class="type-btn" data-t="square" onclick="setType(this)">square</button>
                <button class="type-btn" data-t="sawtooth" onclick="setType(this)">sawtooth</button>
                <button class="type-btn" data-t="triangle" onclick="setType(this)">triangle</button>
            </div>

            <div class="controls">
                <div class="ctrl">
                    <label for="sl-freq">frequency <span id="lbl-freq">1 Hz</span></label>
                    <input type="range" id="sl-freq" min="1" max="8" step="1" value="1" oninput="update()">
                </div>
                <div class="ctrl">
                    <label for="sl-amp">amplitude <span id="lbl-amp">0.5</span></label>
                    <input type="range" id="sl-amp" min="1" max="10" step="1" value="5" oninput="update()">
                </div>
                <div class="ctrl">
                    <label for="sl-phase">phase <span id="lbl-phase">0°</span></label>
                    <input type="range" id="sl-phase" min="0" max="360" step="5" value="0" oninput="update()">
                </div>
                <div class="ctrl">
                    <label for="sl-dc">DC offset <span id="lbl-dc">0.0</span></label>
                    <input type="range" id="sl-dc" min="-5" max="5" step="1" value="0" oninput="update()">
                </div>
            </div>
        </div>
        <div class="feedback win" id="feedback">Adjust your signal to match the target.</div>
        <div class="btn-row">
            <button onclick="newTarget()">new target</button>
            <button onclick="reveal()">reveal</button>
        </div>
    </div>
</body>

</html>
